name: Build & Push All

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service --build-arg PROJECT=AuthService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/auth-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/cart-service --build-arg PROJECT=CartService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/cart-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-service --build-arg PROJECT=CatalogService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/catalog-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-service --build-arg PROJECT=InventoryService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service --build-arg PROJECT=NotificationService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service --build-arg PROJECT=OrderService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service --build-arg PROJECT=PaymentService -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/payment-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway --build-arg PROJECT=ApiGateway -f src/Dockerfile .
        docker push ${{ secrets.DOCKER_USERNAME }}/gateway